<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MsNPK | Creation | VISUAL ARCHITECT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Orbitron:wght@400;900&family=Inter:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --neon-purple: #bc13fe;
            --deep-glow: rgba(188, 19, 254, 0.4);
            --text-main: #ffffff;
            --font-header: 'Syncopate', sans-serif;
            --font-sub: 'Orbitron', sans-serif;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            overflow-x: hidden;
        }

        /* Deep Glow Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a0033 0%, #030303 100%);
            z-index: -1;
        }

        /* Hero Section */
        header {
            height: 60vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        header h1 {
            font-family: var(--font-header);
            font-size: clamp(2rem, 8vw, 5rem);
            letter-spacing: 15px;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 20px var(--deep-glow));
        }

        header p {
            font-family: var(--font-sub);
            font-size: 1rem;
            color: var(--neon-purple);
            letter-spacing: 5px;
            margin-top: 20px;
            text-transform: uppercase;
        }

        /* Layout Grid */
        .container { padding: 100px 10%; }

        h2 {
            font-family: var(--font-header);
            font-size: 1.8rem;
            margin-bottom: 50px;
            border-left: 5px solid var(--neon-purple);
            padding-left: 20px;
        }

        /* SECTION 1: EDITING (Serial-wise with unique animations) */
        .editing-grid { display: flex; flex-direction: column; gap: 80px; }

        .project-row {
            display: flex;
            align-items: center;
            gap: 40px;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeIn 1s forwards;
        }

        .project-row:nth-child(even) { flex-direction: row-reverse; }

        .video-box {
            flex: 1;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(188, 19, 254, 0.3);
            transition: 0.5s;
        }

        .video-box:hover {
            box-shadow: 0 0 50px var(--deep-glow);
            transform: scale(1.02);
            border-color: var(--neon-purple);
        }

        .video-box img { width: 100%; display: block; }

        /* Animation side column */
        .motion-meta {
            width: 150px;
            font-family: var(--font-sub);
            text-align: center;
        }

        .serial-num { font-size: 4rem; font-weight: 900; opacity: 0.2; color: var(--neon-purple); }
        
        /* Unique Cartoonish Animations for each serial */
        .ani-box { 
            height: 60px; 
            margin: 10px 0;
            background: rgba(188, 19, 254, 0.1);
            border-radius: 10px;
            position: relative;
            overflow: hidden;
        }

        /* Serial 01 Animation */
        .ani-1::after { content: "⚡"; position: absolute; font-size: 30px; animation: bounce 1s infinite; left: 40%; }
        /* Serial 02 Animation */
        .ani-2::after { content: "🌀"; position: absolute; font-size: 30px; animation: spin 2s infinite; left: 40%; }
        /* Serial 03 Animation */
        .ani-3::after { content: "🔥"; position: absolute; font-size: 30px; animation: flicker 0.5s infinite; left: 40%; }
        /* Serial 04 Animation */
        .ani-4::after { content: "✨"; position: absolute; font-size: 30px; animation: pulse 1.5s infinite; left: 40%; }

        /* SECTION 2: THUMBNAILS */
        .thumb-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 50px;
        }

        .thumb-item {
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #222;
            transition: 0.4s;
            filter: grayscale(40%);
        }

        .thumb-item:hover {
            filter: grayscale(0%);
            transform: translateY(-10px);
            border-color: var(--neon-purple);
            box-shadow: 0 10px 30px var(--deep-glow);
        }

        .thumb-item img { width: 100%; height: 100%; object-fit: cover; }

        /* CONTACT SECTION */
        .contact-wrap {
            text-align: center;
            padding: 100px 0;
            background: linear-gradient(to top, #0a001a, transparent);
        }

        .punchline {
            font-family: var(--font-header);
            font-size: 1.5rem;
            margin-bottom: 50px;
            color: #fff;
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-link {
            text-decoration: none;
            color: white;
            padding: 15px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 50px;
            font-family: var(--font-sub);
            font-size: 0.8rem;
            transition: 0.4s;
            background: rgba(255,255,255,0.02);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .social-link:hover {
            background: var(--neon-purple);
            border-color: var(--neon-purple);
            box-shadow: 0 0 30px var(--deep-glow);
            transform: scale(1.1);
        }

        /* Animations */
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes flicker { 0% { opacity: 0.5; scale: 0.9; } 50% { opacity: 1; scale: 1.1; } }
        @keyframes pulse { 0% { transform: scale(0.8); opacity: 0.5; } 100% { transform: scale(1.2); opacity: 0; } }

        @media (max-width: 768px) {
            .project-row, .project-row:nth-child(even) { flex-direction: column; }
            .motion-meta { width: 100%; display: flex; justify-content: space-between; align-items: center; }
        }
    </style>
</head>
